version: '3'

tasks:
  default:
    cmds:
      - task -l
    silent: true

  all:
    desc: Run both validation and tests
    cmds:
      - task: validate
      - task: test

  validate:
    desc: Run the cheatsheet validator script
    cmds:
      - bun run scripts/validate_cheatsheets.ts

  test:
    desc: Run bun test unit tests on the validator
    cmds:
      - bun test

  site:convert:
    desc: Convert cheatsheets to Zensical markdown pages
    cmds:
      - bun run scripts/convert_cheatsheets.ts

  site:build:
    desc: Build the static site using Zensical
    cmds:
      - uv run zensical build

  site:serve:
    desc: Serve the static site locally using Zensical
    cmds:
      - uv run zensical serve

  site:deps:
    desc: Install Zensical and other Python dependencies
    cmds:
      - uv sync

  site:check:
    desc: Check Zensical version
    cmds:
      - uv run zensical --version

  site:update:
    desc: Update Zensical to the latest version
    cmds:
      - uv add zensical@latest

  site:validate-toml:
    desc: Validate zensical.toml file syntax
    cmds:
      - uv run python -c "import tomllib, sys; tomllib.load(open('zensical.toml', 'rb'))"
    silent: true

  linkcheck:
    desc: Check for dead links in docs and sheets using lychee
    cmds:
      - lychee docs/ sheets/

  linkcheck-offline:
    desc: Check for dead local links and images in docs and sheets (offline)
    cmds:
      - lychee --offline docs/ sheets/

  linkcheck-file:
    desc: Link check a single file
    cmds:
      - lychee {{shellQuote .FILE}}

