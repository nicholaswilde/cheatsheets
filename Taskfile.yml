version: '3'

tasks:
  default:
    desc: Run both validation and tests
    cmds:
      - task: validate
      - task: test

  validate:
    desc: Run the cheatsheet validator script
    cmds:
      - bun run scripts/validate_cheatsheets.ts

  test:
    desc: Run bun test unit tests on the validator
    cmds:
      - bun test

  site:build:
    desc: Build the static site using Zensical
    cmds:
      - uv run zensical build

  site:serve:
    desc: Serve the static site locally using Zensical
    cmds:
      - uv run zensical serve
