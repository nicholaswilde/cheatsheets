name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Lychee
        run: |
          mkdir -p /tmp/lychee
          curl -sSfL -o /tmp/lychee/lychee.tar.gz https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf /tmp/lychee/lychee.tar.gz -C /tmp/lychee
          sudo mv /tmp/lychee/lychee-x86_64-unknown-linux-gnu/lychee /usr/local/bin/
          rm -rf /tmp/lychee

      - name: Run verification suite (task all)
        run: task all
